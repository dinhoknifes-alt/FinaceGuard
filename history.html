<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceGuard - Histórico</title>
    <!-- Importação correta do Chart.js via CDN -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            color: #191c1d;
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 16px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(15, 28, 44, 0.05), 0 2px 4px -1px rgba(15, 28, 44, 0.03);
        }

        h1 {
            text-align: center;
            color: #0f1c2c;
            font-size: 24px;
            margin-bottom: 24px;
            font-weight: 700;
        }

        .chart-box {
            position: relative;
            margin: auto;
            height: 350px;
            width: 100%;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            margin-top: 24px;
            padding: 10px 20px;
            background-color: #f3f4f5;
            color: #006a62;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .btn-back:hover {
            background-color: #e7e8e9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Histórico de Saldo</h1>

    <!-- Contêiner responsivo para o gráfico de linha -->
    <div class="chart-box">
        <canvas id="historyChart"></canvas>
    </div>

    <!-- Link de retorno corrigido -->
    <a href="index.html" class="btn-back">← Voltar ao Dashboard</a>
</div>

<script>
const ctx = document.getElementById('historyChart').getContext('2d');

// Criação de um gradiente azul suave para o preenchimento abaixo da linha do gráfico
const gradient = ctx.createLinearGradient(0, 0, 0, 300);
gradient.addColorStop(0, 'rgba(0, 106, 98, 0.25)');
gradient.addColorStop(1, 'rgba(0, 106, 98, 0.00)');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
        datasets: [{
            label: 'Saldo Mensal (R$)',
            data:,
            borderColor: '#006a62', // Tom verde-azulado alinhado ao seu ecossistema
            borderWidth: 3,
            pointBackgroundColor: '#006a62',
            pointBorderColor: '#ffffff',
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 7,
            backgroundColor: gradient,
            fill: true,
            tension: 0.35 // Curva suave e profissional na linha
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                display: false // Ocultado para um visual mais limpo, título já explica o dado
            },
            tooltip: {
                backgroundColor: '#0f1c2c',
                titleColor: '#ffffff',
                bodyColor: '#ffffff',
                padding: 12,
                cornerRadius: 8,
                displayColors: false,
                callbacks: {
                    label: function(context) {
                        return 'Saldo: R$ ' + context.raw.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    }
                }
            }
        },
        scales: {
            x: {
                grid: {
                    display: false // Remove as linhas verticais do fundo para limpar o design
                },
                ticks: {
                    color: '#44474c',
                    font: {
                        family: 'Inter',
                        size: 13
                    }
                }
            },
            y: {
                grid: {
                    color: 'rgba(0, 0, 0, 0.04)' // Linhas horizontais sutis
                },
                ticks: {
                    color: '#44474c',
                    font: {
                        family: 'Inter',
                        size: 13
                    },
                    callback: function(value) {
                        return 'R$ ' + value;
                    }
                }
            }
        }
    }
});
</script>

</body>
</html>
