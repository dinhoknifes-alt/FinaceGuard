<script>
const ctx = document.getElementById('historyChart');

new Chart(ctx, {
    type: 'line',
    data: {
        labels: ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun'],
        datasets: [{
            label: 'Saldo Mensal (R$)',

    }
