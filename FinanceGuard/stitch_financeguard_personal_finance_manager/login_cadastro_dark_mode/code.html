            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.4), 0 2px 8px -1px rgba(0, 0, 0, 0.2);

<body class="bg-background font-body-md text-on-surface selection:bg-secondary-container">
<main class="min-h-screen flex flex-col items-center justify-center px-margin-mobile py-xl md:px-margin-tablet">
<!-- Brand Identity Section -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center gap-sm mb-base">
<span class="material-symbols-outlined text-secondary text-4xl" style="font-variation-settings: 'FILL' 1;">shield_person</span>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">FinanceGuard</h1>
</div>
<p class="text-on-surface-variant font-label-md text-label-md">Professional security for your financial future.</p>
</div>
<!-- Auth Card Shell -->
<div class="w-full max-w-[440px] bg-surface-container-lowest ambient-shadow rounded-xl border border-outline-variant p-lg md:p-xl relative overflow-hidden">
<!-- Atmospheric micro-interaction element -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-secondary via-secondary-container to-secondary"></div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container rounded-lg mb-lg">
<button class="flex-1 py-sm font-label-md text-label-md rounded-md tab-transition bg-surface-container-low text-secondary shadow-sm" id="loginTab" onclick="switchTab('login')">
                Login
            </button>
<button class="flex-1 py-sm font-label-md text-label-md rounded-md tab-transition text-on-surface-variant hover:text-on-surface" id="signupTab" onclick="switchTab('signup')">
                Signup
            </button>
</div>
<!-- Forms Container -->
<div class="form-container relative">
<!-- Login Form -->
<form class="space-y-lg opacity-100 transition-opacity duration-300" id="loginForm">
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="loginEmail">Email Address</label>
<input class="w-full h-[48px] px-md border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none bg-surface-container text-on-surface placeholder:text-on-surface-variant/50" id="loginEmail" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface" for="loginPass">Password</label>
<a class="text-secondary font-label-sm text-label-sm hover:underline" href="#">Forgot?</a>
</div>
<input class="w-full h-[48px] px-md border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none bg-surface-container text-on-surface placeholder:text-on-surface-variant/50" id="loginPass" placeholder="••••••••" required="" type="password"/>
</div>
<div class="grid grid-cols-1 gap-md">
<button class="w-full h-[48px] bg-secondary text-on-secondary font-label-md text-label-md rounded-lg ambient-shadow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                        Access Dashboard
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<button class="w-full h-[48px] border-2 border-secondary bg-secondary/5 text-secondary font-label-md text-label-md rounded-lg hover:bg-secondary/10 active:scale-[0.98] transition-all flex items-center justify-center gap-sm group" type="button">
<span class="material-symbols-outlined text-[24px]">face</span>
<span class="material-symbols-outlined text-[24px]">fingerprint</span>
                        Face ID / Touch ID
                    </button>
</div>
<div class="relative py-sm">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-surface-container-lowest px-md text-on-surface-variant font-label-sm">Secured Authentication</span>
</div>
</div>
</form>
<!-- Signup Form (Initially Hidden) -->
<form class="space-y-lg hidden-tab opacity-0 transition-opacity duration-300" id="signupForm">
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="signupName">Full Name</label>
<input class="w-full h-[48px] px-md border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none bg-surface-container text-on-surface" id="signupName" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="signupEmail">Email Address</label>
<input class="w-full h-[48px] px-md border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none bg-surface-container text-on-surface" id="signupEmail" placeholder="name@company.com" type="email"/>
</div>
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="signupPass">Create Password</label>
<input class="w-full h-[48px] px-md border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none bg-surface-container text-on-surface" id="signupPass" placeholder="At least 12 characters" type="password"/>
</div>
<div class="flex items-start gap-sm py-xs">
<input class="mt-1 rounded border-outline-variant text-secondary focus:ring-secondary bg-surface" id="terms" type="checkbox"/>
<label class="font-label-sm text-label-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-secondary hover:underline" href="#">Terms of Service</a> and <a class="text-secondary hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
<button class="w-full h-[48px] bg-secondary text-on-secondary font-label-md text-label-md rounded-lg ambient-shadow hover:brightness-110 active:scale-[0.98] transition-all" type="submit">
                    Create Secure Account
                </button>
</form>
</div>
</div>
<!-- Footer / Trust Badges -->
<footer class="mt-xl text-center space-y-md">
<div class="flex flex-col items-center gap-sm">
<div class="flex items-center justify-center gap-sm px-md py-sm bg-surface-container-high/20 rounded-full border border-outline-variant/30">

<span class="font-label-sm text-label-sm text-on-surface uppercase tracking-widest">AES-256 Encrypted</span>
</div>
<div class="flex items-center gap-base text-on-surface-variant/60 font-label-sm text-[10px] uppercase tracking-tighter">
<span>PIX Certified</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>

</div>

</div>
<div class="flex flex-col items-center opacity-30 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-default">
<div class="bg-contain bg-center bg-no-repeat" style="width: 80px; height: 32px; background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDXMWVcETRXPlSzMSow-B-A0s6jUIdxzzWyRokJqPxEksfpOL891uPtmfXlibo-0_vPN8F9LQGQdVVZMFrfklKFgslvKiJ32YpMArHAu5c3rjCyo0gP-mDcl0jPL7w8d73uatdB68ziJLaq9ayKYSUuYHEcIVr1yZpNy18C0-MLNvX-VK5I8WXHsU9985_fuayL8o9OauiVWx51lwdvJrE9eNT1BqhXntJ4eBVpVGJfbQ7gXVsEzXpoAg')"></div>
</div>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant/40">© 2024 FinanceGuard Systems Inc. All rights reserved.</p>
</footer>
</main>
<script>
    function switchTab(mode) {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');

        if (mode === 'login') {
            loginTab.classList.add('bg-surface-container-low', 'text-secondary', 'shadow-sm');
            loginTab.classList.remove('text-on-surface-variant');
            signupTab.classList.remove('bg-surface-container-low', 'text-secondary', 'shadow-sm');
            signupTab.classList.add('text-on-surface-variant');

            loginForm.classList.remove('hidden-tab');
            setTimeout(() => loginForm.classList.add('opacity-100'), 10);
            signupForm.classList.add('hidden-tab');
            signupForm.classList.remove('opacity-100');
        } else {
            signupTab.classList.add('bg-surface-container-low', 'text-secondary', 'shadow-sm');
            signupTab.classList.remove('text-on-surface-variant');
            loginTab.classList.remove('bg-surface-container-low', 'text-secondary', 'shadow-sm');
            loginTab.classList.add('text-on-surface-variant');

            signupForm.classList.remove('hidden-tab');
            setTimeout(() => signupForm.classList.add('opacity-100'), 10);
            loginForm.classList.add('hidden-tab');
            loginForm.classList.remove('opacity-100');
        }
    }

    document.querySelectorAll('form').forEach(form => {
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = form.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Access Granted`;
                btn.classList.replace('bg-secondary', 'bg-surface-container-high');
            }, 1500);
        });
    });
</script>
</body></html>
