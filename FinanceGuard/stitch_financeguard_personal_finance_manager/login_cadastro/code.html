<button class="flex-1 py-sm font-label-md text-label-md rounded-md tab-transition text-on-surface-variant hover:text-primary" id="signupTab" onclick="switchTab('signup')">

</div>
<!-- Forms Container -->
<div class="form-container relative">
<!-- Login Form -->

<div class="space-y-sm">

<div class="relative">

</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-on-surface" for="loginPass">Password</label>
<a class="text-secondary font-label-sm text-label-sm hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full h-[48px] px-md pt-base border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary/20 focus:border-secondary transition-all outline-none bg-surface text-on-surface" id="loginPass" placeholder="••••••••" required="" type="password">
</div>
</div>
<button class="w-full h-[48px] bg-secondary text-on-secondary font-label-md text-label-md rounded-lg ambient-shadow hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                        Access Dashboard
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<div class="relative py-sm">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-surface-container-lowest px-md text-on-surface-variant font-label-sm">Or secure biometric sign-in</span>
</div>
</div>
<button class="w-full h-[48px] border border-outline bg-transparent text-primary font-label-md text-label-md rounded-lg hover:bg-surface-container transition-colors flex items-center justify-center gap-sm" type="button">
<span class="material-symbols-outlined text-secondary">fingerprint</span>
                        Biometric Login
                    </button>
</form>
<!-- Signup Form (Initially Hidden) -->
<form class="space-y-lg hidden-tab opacity-0 transition-opacity duration-300" id="signupForm">
<div class="space-y-sm">
<label class="block font-label-md text-label-md text-on-surface" for="signupName">Full Name</label>

</div>
<div class="space-y-sm">

</div>
<div class="flex flex-col items-center opacity-40 grayscale hover:grayscale-0 hover:opacity-100 transition-all cursor-default">

</main>
<script>
        function switchTab(mode) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if (mode === 'login') {
                // Tab styling
                loginTab.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                loginTab.classList.remove('text-on-surface-variant');
                signupTab.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                signupTab.classList.add('text-on-surface-variant');

                // Content visibility
                loginForm.classList.remove('hidden-tab');
                setTimeout(() => loginForm.classList.add('opacity-100'), 10);
                signupForm.classList.add('hidden-tab');
                signupForm.classList.remove('opacity-100');
            } else {
                // Tab styling
                signupTab.classList.add('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                signupTab.classList.remove('text-on-surface-variant');
                loginTab.classList.remove('bg-surface-container-lowest', 'text-primary', 'shadow-sm');
                loginTab.classList.add('text-on-surface-variant');

                // Content visibility
                signupForm.classList.remove('hidden-tab');
                setTimeout(() => signupForm.classList.add('opacity-100'), 10);
                loginForm.classList.add('hidden-tab');
                loginForm.classList.remove('opacity-100');
            }
        }

        // Form submission micro-interaction
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = form.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.disabled = true;
                btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...`;
                
                setTimeout(() => {
                    btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Access Granted`;
                    btn.classList.replace('bg-secondary', 'bg-tertiary-container');
                }, 1500);
            });
        });
    </script>
