<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f1c2c; /* primary-container fallback */
        }
        
        .loading-bar-container {
            width: 140px;
            height: 2px;
            background: rgba(186, 200, 220, 0.2); /* inverse-primary with opacity */
            border-radius: 999px;
            overflow: hidden;
            margin-top: 24px;
        }
        
        .loading-bar-progress {
            height: 100%;
            width: 30%;
            background: #ffffff;
            border-radius: 999px;
            animation: loadingMove 2s infinite ease-in-out;
        }

        @keyframes loadingMove {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(200%); }
            100% { transform: translateX(-100%); }
        }

        .fade-in {
            animation: fadeIn 1s forwards ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shield-glow {
            filter: drop-shadow(0 0 15px rgba(112, 248, 232, 0.3));
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- Atmospheric Background Shader -->

<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center p-margin-mobile text-center fade-in">
<!-- Identity Branding Block -->
<div class="relative mb-lg group">
<!-- Shield & Currency Icon Composition -->
<div class="w-24 h-24 md:w-32 md:h-32 bg-on-primary-fixed/10 backdrop-blur-md rounded-xl flex items-center justify-center border border-on-primary-fixed/20 shield-glow transition-transform duration-700 hover:scale-105">
<span class="material-symbols-outlined text-[48px] md:text-[64px] text-on-primary absolute opacity-20" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="material-symbols-outlined text-[32px] md:text-[40px] text-secondary-fixed relative z-10" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
</div>
<!-- Brand Text Anchor -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-primary tracking-tight mb-base">
            FinanceGuard
        </h1>
<!-- Tagline / Subtitle -->
<p class="font-label-md text-label-md text-on-primary-container/80 max-w-[240px] leading-relaxed">
            Your secure gateway to intelligent wealth management.
        </p>
<!-- Functional Indicator -->
<div class="loading-bar-container">
<div class="loading-bar-progress"></div>
</div>
<!-- Security Badge -->
<div class="mt-xl flex items-center gap-xs text-on-primary-container/60">
<span class="material-symbols-outlined text-[14px]" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">End-to-End Encrypted</span>
</div>
</main>
<!-- Subtle Scanline Effect for "High Security" aesthetic -->
<div class="pointer-events-none absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.1)_50%),linear-gradient(90deg,rgba(255,0,0,0.02),rgba(0,255,0,0.01),rgba(0,0,255,0.02))] bg-[length:100%_4px,3px_100%] z-20 opacity-20"></div>
<script>
        // Simple micro-interaction for the logo on mouse move
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('.shield-glow');
            if (!logo) return;
            
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            
            logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Auto-redirect simulation or task completion
        window.addEventListener('load', () => {
            console.log('FinanceGuard System Initialized...');
            // In a real app, logic for checking auth or loading initial data would go here
        });
    </script>
</body></html>
