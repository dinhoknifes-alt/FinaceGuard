            }
          },
        },
      }
    }catch(_e){}</script></head><body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface-container flex justify-between items-center px-gutter h-16 w-full">
<div class="flex items-center gap-3">
<button class="text-on-surface hover:bg-surface-variant p-2 rounded-full transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-primary">New Transaction</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;" data-original-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm text-on-surface-variant hidden md:block">SECURE SESSION</span>
</div>
</header>
<main class="pt-24 px-gutter max-w-2xl mx-auto space-y-stack-md">
<!-- Transaction Type Toggle -->
<div class="flex bg-surface-container-high p-1 rounded-xl">
<button onclick="setType('expense')" id="btn-expense" class="flex-1 py-3 rounded-lg font-headline-md text-headline-md-mobile transition-all bg-primary-container text-on-primary-container shadow-sm">
                Expense
            </button>
<button onclick="setType('income')" id="btn-income" class="flex-1 py-3 rounded-lg font-headline-md text-headline-md-mobile transition-all text-on-surface-variant hover:text-on-surface">
                Income
            </button>
</div>
<!-- Amount Input Section -->
<div class="bg-surface-container p-container-padding rounded-xl border border-outline-variant/30 text-center space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant block uppercase tracking-widest">Transaction Amount</label>
<div class="flex items-center justify-center gap-2">
<span id="currency-symbol" class="font-headline-lg text-headline-lg-mobile text-primary">$</span>
<input type="number" placeholder="0.00" class="bg-transparent border-none text-center font-headline-lg text-headline-lg-mobile text-on-surface placeholder:text-surface-variant w-full focus:ring-0" step="0.01">
</div>
</div>
<!-- Details Bento Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-sm">
<!-- Category Selection -->
<div class="bg-surface-container p-gutter rounded-xl border border-outline-variant/30 space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">category</span> Category
                </label>
<div class="relative">
<select class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-3 py-2.5 text-on-surface appearance-none cursor-pointer">
<option>Housing &amp; Rent</option>
<option>Food &amp; Dining</option>
<option>Transportation</option>
<option>Entertainment</option>
<option>Utilities</option>
<option value="custom">+ Create Custom Category</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-original-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Date Selection -->
<div class="bg-surface-container p-gutter rounded-xl border border-outline-variant/30 space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">calendar_today</span> Date
                </label>
<input type="date" class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-3 py-2 text-on-surface color-scheme-dark" value="2023-10-27">
</div>
<!-- Wallet/Account -->
<div class="bg-surface-container p-gutter rounded-xl border border-outline-variant/30 space-y-2 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">account_balance_wallet</span> Source Account
                </label>
<div class="grid grid-cols-2 sm:grid-cols-3 gap-2">
<button class="flex items-center gap-2 bg-primary-container/10 border border-primary/50 text-primary p-3 rounded-lg text-left transition-all active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">credit_card</span>
<div class="overflow-hidden">
<p class="font-label-md text-label-md truncate">Main Debit</p>
<p class="text-[10px] opacity-70">**** 4421</p>
</div>
</button>
<button class="flex items-center gap-2 bg-surface-container-high border border-outline-variant/30 text-on-surface-variant p-3 rounded-lg text-left hover:border-outline transition-all active:scale-95">
<span class="material-symbols-outlined">payments</span>
<div class="overflow-hidden">
<p class="font-label-md text-label-md truncate">Cash Vault</p>
<p class="text-[10px] opacity-70">Personal</p>
</div>
</button>
<button class="flex items-center gap-2 bg-surface-container-high border border-outline-variant/30 text-on-surface-variant p-3 rounded-lg text-left hover:border-outline transition-all active:scale-95">
<span class="material-symbols-outlined">savings</span>
<div class="overflow-hidden">
<p class="font-label-md text-label-md truncate">Savings</p>
<p class="text-[10px] opacity-70">Emergency</p>
</div>
</button>
</div>
</div>
<!-- Notes -->
<div class="bg-surface-container p-gutter rounded-xl border border-outline-variant/30 space-y-2 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-sm">sticky_note_2</span> Transaction Note
                </label>
<textarea rows="3" placeholder="Add details about this transaction..." class="w-full bg-surface-container-high border border-outline-variant rounded-lg px-3 py-2 text-on-surface resize-none placeholder:text-surface-variant"></textarea>
</div>
</div>
<!-- Recurring Toggle Card -->
<div class="bg-surface-container-low p-gutter rounded-xl border border-outline-variant/10 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-tertiary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary">autorenew</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface">Recurring Transaction</h3>
<p class="text-[12px] text-on-surface-variant">Automatically repeat this entry</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input type="checkbox" value="" class="sr-only peer">
<div class="w-11 h-6 bg-surface-variant peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Advanced Features - Tags & Receipt -->
<div class="flex gap-4 overflow-x-auto pb-2 scrollbar-hide">
<button class="flex-none flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">sell</span>
<span class="font-label-sm text-label-sm">Add Tags</span>
</button>
<button class="flex-none flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">receipt</span>
<span class="font-label-sm text-label-sm">Attach Receipt</span>
</button>
<button class="flex-none flex items-center gap-2 px-4 py-2 bg-surface-container-high rounded-full border border-outline-variant text-on-surface-variant hover:text-on-surface transition-colors">
<span class="material-symbols-outlined text-sm">location_on</span>
<span class="font-label-sm text-label-sm">Add Location</span>
</button>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-headline-md py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
                Save Transaction
            </button>
<p class="text-center text-[11px] text-on-surface-variant mt-4 uppercase tracking-[0.2em]">End-to-End Encrypted Secure Entry</p>
</div>
</main>
<!-- BottomNavBar (Suppressed for transactional screen as per task guidance, but included structure if user navigated back) -->
<!-- Note: Following "The Filter" Rule - Suppressing BottomNavBar on Transactional screens to prioritize focus -->
<script>
        function setType(type) {
            const expenseBtn = document.getElementById('btn-expense');
            const incomeBtn = document.getElementById('btn-income');
            const amountSymbol = document.getElementById('currency-symbol');

            if (type === 'expense') {
                expenseBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                expenseBtn.classList.remove('text-on-surface-variant');
                incomeBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                incomeBtn.classList.add('text-on-surface-variant');
                amountSymbol.classList.replace('text-primary', 'text-error');
                amountSymbol.innerText = '-$';
            } else {
                incomeBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                incomeBtn.classList.remove('text-on-surface-variant');
                expenseBtn.classList.remove('bg-primary-container', 'text-on-primary-container', 'shadow-sm');
                expenseBtn.classList.add('text-on-surface-variant');
                amountSymbol.classList.replace('text-error', 'text-primary');
                amountSymbol.innerText = '+$';
            }
        }
    </script>
</body></html>
