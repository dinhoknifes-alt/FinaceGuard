<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>FinanceGuard - Secure Splash</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#0c141f",
                    "surface-dim": "#0c141f",
                    "surface-bright": "#323a46",
                    "surface-container-lowest": "#070f19",
                    "surface-container-low": "#141c27",
                    "surface-container": "#1d252f",
                    "surface-container-high": "#28303a",
                    "surface-container-highest": "#323a46",
                    "on-surface": "#ffffff",
                    "on-surface-variant": "#c4c6cc",
                    "outline": "#8e9199",
                    "outline-variant": "#44474e",
                    "primary": "#10b981",
                    "on-primary": "#ffffff",
                    "primary-container": "#005238",
                    "on-primary-container": "#b4ffd4",
                    "secondary": "#bac8dc",
                    "on-secondary": "#243240",
                    "secondary-container": "#3a4858",
                    "on-secondary-container": "#d6e4f7",
                    "tertiary": "#e0c1a0",
                    "on-tertiary": "#402d14",
                    "tertiary-container": "#59432a",
                    "on-tertiary-container": "#feddba",
                    "background": "#0c141f",
                    "on-background": "#ffffff",
                    "error": "#ffb4ab",
                    "on-error": "#690005",
                    "error-container": "#93000a",
                    "on-error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "0.5rem",
                    "xl": "1rem",
                    "full": "9999px"
            },
            "spacing": {
                    "sm": "8px",
                    "margin-mobile": "20px",
                    "base": "4px",
                    "gutter": "16px",
                    "md": "16px",
                    "xs": "4px",
                    "margin-tablet": "32px",
                    "lg": "24px",
                    "xl": "32px"
            },
            "fontFamily": {
                    "headline-md": ["Manrope"],
                    "label-md": ["Manrope"],
                    "body-lg": ["Manrope"],
                    "display": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "numeric-lg": ["Manrope"],
                    "headline-lg-mobile": ["Manrope"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "numeric-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0c141f; /* surface-dim */
        }
        
        .loading-bar-container {
            width: 140px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            overflow: hidden;
            margin-top: 24px;
        }
        
        .loading-bar-progress {
            height: 100%;
            width: 30%;
            background: #10b981; /* primary */
            border-radius: 999px;
            animation: loadingMove 2s infinite ease-in-out;
        }

        @keyframes loadingMove {
            0% { transform: translateX(-100%); }
            50% { transform: translateX(200%); }
            100% { transform: translateX(-100%); }
        }

        .fade-in {
            animation: fadeIn 1s forwards ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .shield-glow {
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.15));
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-surface">
<main class="relative z-10 flex flex-col items-center justify-center p-margin-mobile text-center fade-in">
<!-- Identity Branding Block -->
<div class="relative mb-lg group">
<!-- Shield & Currency Icon Composition -->
<div class="w-24 h-24 md:w-32 md:h-32 bg-surface-container-high/40 backdrop-blur-md rounded-xl flex items-center justify-center border border-outline-variant/30 shield-glow transition-transform duration-700 hover:scale-105">
<span class="material-symbols-outlined text-[48px] md:text-[64px] text-primary absolute opacity-10" data-icon="shield" style="font-variation-settings: 'FILL' 1;">shield</span>
<span class="material-symbols-outlined text-[32px] md:text-[40px] text-primary relative z-10" data-icon="account_balance_wallet" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
</div>
<!-- Brand Text Anchor -->
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface tracking-tight mb-base">
        FinanceGuard
    </h1>
<!-- Tagline / Subtitle -->
<p class="font-label-md text-label-md text-on-surface-variant max-w-[240px] leading-relaxed">
        Your secure gateway to intelligent wealth management.
    </p>
<!-- Functional Indicator -->
<div class="loading-bar-container">
<div class="loading-bar-progress"></div>
</div>
<!-- Security Badges Section -->
<div class="mt-xl flex flex-col items-center gap-sm">
<div class="flex items-center gap-xs text-primary/80">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">End-to-End Encrypted</span>
</div>
<div class="flex items-center gap-xs text-primary/80">
<span class="material-symbols-outlined text-[16px]" data-icon="fingerprint">fingerprint</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Biometric Protected</span>
</div>
</div>
</main>
<!-- Subtle Scanline Effect for "High Security" aesthetic -->
<div class="pointer-events-none absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.05)_50%),linear-gradient(90deg,rgba(16,185,129,0.01),rgba(16,185,129,0.005),rgba(16,185,129,0.01))] bg-[length:100%_4px,3px_100%] z-20 opacity-30"></div>
<script>
    // Simple micro-interaction for the logo on mouse move
    document.addEventListener('mousemove', (e) => {
        const logo = document.querySelector('.shield-glow');
        if (!logo) return;
        
        const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
        
        logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    window.addEventListener('load', () => {
        console.log('FinanceGuard System Initialized...');
    });
</script>
</body></html>
